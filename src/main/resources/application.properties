spring.application.name=patent-api
server.port=${PORT:8080}

server.tomcat.threads.max=${SERVER_TOMCAT_THREADS_MAX:50}
server.tomcat.threads.min-spare=${SERVER_TOMCAT_THREADS_MIN_SPARE:5}
server.tomcat.accept-count=${SERVER_TOMCAT_ACCEPT_COUNT:50}

external.serp-api.key=${SERP_API_KEY:}
external.serp-api.base-url=${SERP_API_BASE_URL:https://serpapi.com}
external.deepl.key=${DEEPL_API_KEY:}
external.deepl.base-url=${DEEPL_API_BASE_URL:https://api-free.deepl.com}

logging.level.com.jjs.patentapi=${APP_LOG_LEVEL:INFO}

management.endpoints.web.exposure.include=health
